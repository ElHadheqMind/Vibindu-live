# Cloud Build Configuration for GRAFCET & GEMMA Editor
# This file automates the build and deployment process to Google Cloud Run

steps:
  # Step 1: Build Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/backend:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/backend:latest'
      - './grafcet-backend'

  # Step 2: Build Agents Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-agents'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/agents:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/agents:latest'
      - './grafcet-agents'

  # Step 3: Build Frontend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/frontend:$SHORT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/frontend:latest'
      - '--build-arg'
      - 'VITE_API_BASE_URL=${_BACKEND_URL}/api'
      - './grafcet-editor'

  # Step 4: Push Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/backend'
    waitFor: ['build-backend']

  # Step 5: Push Agents Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-agents'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/agents'
    waitFor: ['build-agents']

  # Step 6: Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/frontend'
    waitFor: ['build-frontend']

  # Step 7: Deploy Agents Service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-agents'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'grafcet-agents'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/agents:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--set-secrets=GEMINI_API_KEY=gemini-api-key:latest'
      - '--set-env-vars=PORT=8000,GEMINI_MODEL=gemini-3.1-flash-lite-preview'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--timeout=300'
    waitFor: ['push-agents']

  # Step 8: Deploy Backend Service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'grafcet-backend'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/backend:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--set-secrets=JWT_SECRET=jwt-secret:latest,GOOGLE_CLIENT_ID=google-client-id:latest'
      - '--set-env-vars=PORT=3001,NODE_ENV=production,STORAGE_DRIVER=local,STORAGE_PATH=/app/data,DATABASE_URL=file:/app/data/dev.db,CORS_ORIGIN=${_FRONTEND_URL}'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--timeout=300'
    waitFor: ['push-backend']

  # Step 9: Deploy Frontend Service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'grafcet-frontend'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO}/frontend:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=10'
    waitFor: ['push-frontend']

# Substitution variables (can be overridden in trigger settings)
substitutions:
  _REGION: 'us-central1'
  _ARTIFACT_REGISTRY_REPO: 'grafcet-repo'
  _SERVICE_ACCOUNT: 'grafcet-app@${PROJECT_ID}.iam.gserviceaccount.com'
  _BACKEND_URL: 'https://grafcet-backend-XXXXXXXXXX-uc.a.run.app'  # Update after first deployment
  _FRONTEND_URL: 'https://grafcet-frontend-XXXXXXXXXX-uc.a.run.app'  # Update after first deployment

# Build timeout
timeout: '1800s'

# Build options
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

